<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Solid White Background so it matches your image -->
  <circle cx="50" cy="50" r="49" fill="#ffffff" />
  
  <!-- Outer Black Circle -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#000000" stroke-width="2" />
  
  <!-- Inner Thick Circle -->
  <circle cx="50" cy="50" r="32" fill="none" stroke="#000000" stroke-width="3" />
  
  <!-- Inner Thin Circle -->
  <circle cx="50" cy="50" r="28" fill="none" stroke="#000000" stroke-width="1" />

  <!-- 4 Sharp Compass Points (Pointing OUTWARDS) -->
  <path d="M50 4 L43 31 L57 31 Z" fill="#000000" />
  <path d="M50 96 L43 69 L57 69 Z" fill="#000000" />
  <path d="M4 50 L31 43 L31 57 Z" fill="#000000" />
  <path d="M96 50 L69 43 L69 57 Z" fill="#000000" />

  <!-- Inner Gauge Ticks -->
  <g stroke="#000000" stroke-width="1.5" stroke-linecap="round">
    <line x1="50" y1="24" x2="50" y2="18" transform="rotate(30 50 50)" />
    <line x1="50" y1="24" x2="50" y2="18" transform="rotate(60 50 50)" />
    <line x1="50" y1="24" x2="50" y2="18" transform="rotate(120 50 50)" />
    <line x1="50" y1="24" x2="50" y2="18" transform="rotate(150 50 50)" />
    <line x1="50" y1="24" x2="50" y2="18" transform="rotate(210 50 50)" />
    <line x1="50" y1="24" x2="50" y2="18" transform="rotate(240 50 50)" />
    <line x1="50" y1="24" x2="50" y2="18" transform="rotate(300 50 50)" />
    <line x1="50" y1="24" x2="50" y2="18" transform="rotate(330 50 50)" />
  </g>

  <!-- Thick Red Needle -->
  <path d="M 45 55 L 55 45 L 75 25 Z" fill="#e62020" />

  <!-- Center Pivot with White Highlight -->
  <circle cx="50" cy="50" r="7" fill="#000000" />
  <circle cx="52" cy="48" r="2.5" fill="#ffffff" />
</svg>